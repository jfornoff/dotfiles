###########################
#  Configuration
###########################

# tmux-256color enables italics and other features screen-256color lacks;
# terminal-overrides enables true 24-bit color passthrough to the outer terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# increase scroll-back history
set -g history-limit 50000

# use vim key bindings
setw -g mode-keys vi

set-option -g mouse off
#
# eliminate escape sequence delay so vim/neovim mode changes are instant
set -sg escape-time 0

# increase repeat time for repeatable commands
set -g repeat-time 1000

# start window index at 1
set -g base-index 1

# start pane index at 1
setw -g pane-base-index 1

# highlight window when it has new activity
setw -g monitor-activity on
set -g visual-activity on

# disable automatic renaming of panes
setw -g automatic-rename off

set -g default-shell $SHELL

###########################
#  Key Bindings
###########################
set -g prefix C-a
unbind C-b
bind C-a send-prefix


# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# navigate between panes
bind -r ^H select-pane -L
bind -r ^J select-pane -D
bind -r ^K select-pane -U
bind -r ^L select-pane -R

# fatfinger protection
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# toggle between panes
unbind ^T
bind ^T select-pane -t :.+

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

###########################
# Status Bar
###########################

# set refresh interval for status bar
set -g status-interval 30

# center the status bar
set -g status-justify left

# show session, window, pane in left status bar
set -g status-left-length 40
set -g status-left '#[fg=green]#S#[fg=blue] #I:#P#[default]'

# show hostname, date, and time in right status bar
set-option -g status-right '#[fg=green]#H#[default] %m/%d/%y %I:%M'

###########################
# Colors
###########################

# color status bar
set -g status-bg colour235
set -g status-fg white

# highlight current window
set-window-option -g window-status-current-style fg=colour231,bg=green

# set color of active pane
set -g pane-active-border-style fg=colour231,bg=default
set -g pane-border-style fg=colour231,bg=default
